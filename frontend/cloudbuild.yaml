steps:
  - name: 'node:22'
    dir: 'frontend'
    entrypoint: npm
    args: ['install']

  - name: 'node:22'
    dir: 'frontend'
    entrypoint: npm
    args: ['run', 'build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    dir: 'frontend'
    entrypoint: gcloud
    args: ['app', 'deploy', 'app.yaml', '--quiet']

timeout: '1600s'

options:
  logging: CLOUD_LOGGING_ONLY